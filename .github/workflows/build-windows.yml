name: Build Windows App
permissions:
  contents: write
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Set version variable
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
      
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean abc-music-manager.spec

      - name: Package portable ZIP
        run: |
          Compress-Archive -LiteralPath @(
            "dist/ABC Music Manager.exe",
            "README.md",
            "LICENSE.txt",
            "NOTICE.txt",
            "CHANGELOG.md"
          ) -DestinationPath "ABC-Music-Manager-${env:VERSION}-Windows.zip" -Force

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ABC-Music-Manager-Windows
          path: ABC-Music-Manager-${{ github.ref_name }}-Windows.zip
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ABC-Music-Manager-${{ github.ref_name }}-Windows.zip
          generate_release_notes: true
