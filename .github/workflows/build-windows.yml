name: Build Windows App
permissions:
  contents: write
on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Set version variable
        shell: bash
        run: |
          echo "VERSION=${GITHUB_REF_NAME}" >> $GITHUB_ENV
      
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build with PyInstaller
        run: |
          pyinstaller `
            --noconfirm `
            --clean `
            --windowed `
            --name "ABC Music Manager" `
            --icon "resources/icons/app.ico" `
            main.py

      - name: Copy extra release files
        run: |
          Copy-Item README.md "dist/ABC Music Manager/"
          Copy-Item LICENSE.txt "dist/ABC Music Manager/"
          Copy-Item CHANGELOG.md "dist/ABC Music Manager/"
          Copy-Item NOTICE.txt "dist/ABC Music Manager/"

      - name: Package portable ZIP
        run: |
          Compress-Archive -Path "dist/ABC Music Manager/*" -DestinationPath "ABC-Music-Manager-${env:VERSION}-Windows.zip"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ABC-Music-Manager-Windows
          path: ABC-Music-Manager-${{ github.ref_name }}-Windows.zip
          retention-days: 7

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: ABC-Music-Manager-${{ github.ref_name }}-Windows.zip
          generate_release_notes: true
